name: Hello Python App to Docker

on:
  push:
    branches:
      - main
    paths:
      - "docker/app1-hello/python/**" # Triggers only when Python files change
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Standard version for 2026

      - name: Install Dependencies
        working-directory: docker/app1-hello/python
        run: |
          python -m pip install --upgrade pip
           pip install -r requirements.txt

      - name: Run Smoke Tests
        working-directory: docker/app1-hello/python
        run: |
           python -m py_compile main.py

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/app1-hello/python
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hello-python:latest

    #trigger update 1